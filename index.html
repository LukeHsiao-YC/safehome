<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居家安全偵查隊</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 加入 data-presets="react" 確保 Babel 正確識別 React 環境 -->
  <script type="text/babel" data-presets="react">
    // 確保 Babel 使用 React.createElement，避免自動產生 import 導致瀏覽器報錯
    /** @jsx React.createElement */
    /** @jsxFrag React.Fragment */

    // 🛑 絕對不要在這裡寫任何 import 語法！ 🛑
    // 您遇到的錯誤是因為瀏覽器不接受單一檔案中的 import 語法 (或者 Babel 試圖編譯為模組)。
    // 這裡已經幫您設定好全域變數，請「直接完整複製」這份檔案即可，不要把原本檔案最上方的 import 貼回來。

    const { useState } = React;

    // --- 圖示元件區 (替換原本的 lucide-react 以確保單一檔案可直接執行) ---
    const IconWrapper = ({ size = 24, className = "", children }) => (
      <svg width={size} height={size} className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );
    const BedDouble = (p) => <IconWrapper {...p}><path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"/><path d="M2 14h20"/></IconWrapper>;
    const Pill = (p) => <IconWrapper {...p}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></IconWrapper>;
    const Droplet = (p) => <IconWrapper {...p}><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></IconWrapper>;
    const Flame = (p) => <IconWrapper {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></IconWrapper>;
    const Baby = (p) => <IconWrapper {...p}><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M22.5 7.5a2.5 2.5 0 0 1-2.5 2.5h-1a2.5 2.5 0 0 1-2.5-2.5v-1a2.5 2.5 0 0 1 2.5-2.5h1a2.5 2.5 0 0 1 2.5 2.5z"/><path d="M4 7.5A2.5 2.5 0 0 0 6.5 10h1a2.5 2.5 0 0 0 2.5-2.5v-1A2.5 2.5 0 0 0 7.5 4h-1A2.5 2.5 0 0 0 4 7.5z"/><circle cx="12" cy="12" r="7"/></IconWrapper>;
    const Shield = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></IconWrapper>;
    const Home = (p) => <IconWrapper {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
    const SquareCheck = (p) => <IconWrapper {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
    const AlertTriangle = (p) => <IconWrapper {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconWrapper>;
    const HeartPulse = (p) => <IconWrapper {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></IconWrapper>;
    const Phone = (p) => <IconWrapper {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>;
    const ChevronRight = (p) => <IconWrapper {...p}><path d="m9 18 6-6-6-6"/></IconWrapper>;

    // --- 資料區：整合檢核表與簡報重點 ---
    const topics = [
      {
        id: 'sleep',
        title: '睡眠安全',
        icon: <BedDouble className="w-8 h-8 text-indigo-500" />,
        color: 'bg-indigo-50 border-indigo-200',
        description: '預防嬰兒猝死症，建立安全的睡眠環境。',
        points: [
          '仰睡是唯一推薦的安全睡姿。',
          '嬰兒床鋪表面必須堅實平整，不要放置枕頭、被褥或填充玩具。',
          '同室不同床：建議與父母同室但不同床。',
          '避免環境過熱，不要穿著太多衣物。'
        ]
      },
      {
        id: 'choking',
        title: '防誤食與梗塞',
        icon: <Pill className="w-8 h-8 text-emerald-500" />,
        color: 'bg-emerald-50 border-emerald-200',
        description: '守護孩子的呼吸道，危險物品請收好。',
        points: [
          '危險物品(藥品、電池、清潔劑)應高於110公分存放或上鎖。',
          '清潔劑請保留原瓶包裝，絕不分裝至飲料瓶。',
          '玩具大小需大於3.2公分，避免幼童吞入。',
          '避免讓幼兒單獨食用果凍、堅果等易梗塞食物。'
        ]
      },
      {
        id: 'drowning',
        title: '溺水預防',
        icon: <Droplet className="w-8 h-8 text-blue-500" />,
        color: 'bg-blue-50 border-blue-200',
        description: '溺水往往發生在無聲之中，全程陪同最重要。',
        points: [
          '洗澡時大人絕對不可離開，連接電話的短暫時間也不行。',
          '浴缸、水桶使用完畢務必倒掉儲水。',
          '若家中有蓄水池或漁塭，務必加裝防墜圍籬。',
          '戲水時依據孩子手臂長度判定安全水位。'
        ]
      },
      {
        id: 'burns',
        title: '防燙與觸電',
        icon: <Flame className="w-8 h-8 text-orange-500" />,
        color: 'bg-orange-50 border-orange-200',
        description: '廚房與電器是居家危險源，安全檢查不可省。',
        points: [
          '熱水器溫度建議調降至攝氏50度以下。',
          '餐桌不使用長桌巾，防止孩子拉扯導致湯水潑灑。',
          '未使用之插座務必加上安全防護蓋。',
          '高熱家電電線應妥善隱蔽，避免垂墜。'
        ]
      },
      {
        id: 'falls',
        title: '防墜與跌倒',
        icon: <Baby className="w-8 h-8 text-rose-500" />,
        color: 'bg-rose-50 border-rose-200',
        description: '防墜措施做得好，孩子長大沒煩惱。',
        points: [
          '陽台欄杆高度應高於110公分，間距小於10公分。',
          '窗邊及陽台嚴禁放置可供攀爬之家具或盆栽。',
          '樓梯口設置高於85公分之穩固安全柵欄。',
          '浴室地面加裝防滑設施，家具銳角使用防撞護條。'
        ]
      }
    ];

    const checklistItems = [
      { id: 'c1', category: '睡眠環境', text: '嬰幼兒睡床內無放置鬆軟枕頭、被褥或玩具。' },
      { id: 'c2', category: '睡眠環境', text: '床鋪柵欄間隙小於6公分，結構穩固。' },
      { id: 'c3', category: '防墜措施', text: '陽台窗戶旁無放置可供攀爬的家具或雜物。' },
      { id: 'c4', category: '防墜措施', text: '樓梯出入口設有高於85公分之穩固柵欄。' },
      { id: 'c5', category: '防誤食', text: '藥品、電池、清潔劑收納於110公分以上高處。' },
      { id: 'c6', category: '防誤食', text: '清潔劑保留原包裝，無分裝於飲料瓶中。' },
      { id: 'c7', category: '防燙防電', text: '熱水器溫度設定於50度以下。' },
      { id: 'c8', category: '防燙防電', text: '家中未使用之插座皆安裝安全護蓋。' },
      { id: 'c9', category: '防溺水', text: '浴室桶槽內平時保持無儲水狀態。' },
      { id: 'c10', category: '一般防護', text: '家具尖銳邊角加裝防撞防護。' },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [selectedTopic, setSelectedTopic] = useState(null);
      const [checkedState, setCheckedState] = useState({});

      const handleCheck = (id) => setCheckedState(prev => ({ ...prev, [id]: !prev[id] }));
      
      const totalItems = checklistItems.length;
      const checkedCount = Object.values(checkedState).filter(Boolean).length;
      const score = totalItems > 0 ? Math.round((checkedCount / totalItems) * 100) : 0;

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800">
          <nav className="bg-white border-b sticky top-0 z-50">
            <div className="max-w-4xl mx-auto px-4 flex justify-between items-center h-16">
              <div 
                className="flex items-center gap-2 cursor-pointer font-bold text-lg" 
                onClick={() => { setActiveTab('home'); setSelectedTopic(null); }}
              >
                <Shield className="text-indigo-600" /> 安全偵查隊
              </div>
              <div className="flex gap-2">
                {[ 
                  { id: 'home', label: '主題', icon: <Home size={18}/> }, 
                  { id: 'checklist', label: '清單', icon: <SquareCheck size={18}/> }, 
                  { id: 'emergency', label: '急救', icon: <AlertTriangle size={18}/> } 
                ].map(tab => (
                  <button 
                    key={tab.id} 
                    onClick={() => { setActiveTab(tab.id); setSelectedTopic(null); }} 
                    className={`p-2 rounded-lg flex items-center gap-1 transition-colors ${activeTab === tab.id ? 'bg-indigo-100 text-indigo-700' : 'text-gray-500 hover:bg-gray-100'}`}
                    title={tab.label}
                  >
                    {tab.icon}
                    <span className="hidden sm:inline text-sm font-medium">{tab.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </nav>

          <main className="max-w-4xl mx-auto p-4 py-8">
            {activeTab === 'home' && !selectedTopic && (
              <div className="space-y-6">
                <div className="bg-indigo-600 text-white p-8 rounded-2xl shadow-sm">
                  <h1 className="text-2xl md:text-3xl font-bold mb-3">居家安全大追蹤</h1>
                  <p className="opacity-90 leading-relaxed">家是孩子最常發生事故的場所(60-80%)，跟著我們一起找出隱藏的危險陷阱！</p>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {topics.map(t => (
                    <div 
                      key={t.id} 
                      onClick={() => setSelectedTopic(t)} 
                      className={`${t.color} border p-5 rounded-xl cursor-pointer hover:shadow-md transition-all flex items-center gap-4`}
                    >
                      <div className="flex-shrink-0 bg-white p-2 rounded-full shadow-sm">{t.icon}</div>
                      <div>
                        <h3 className="font-bold text-lg text-gray-900">{t.title}</h3>
                        <p className="text-sm opacity-80 text-gray-700 mt-1">{t.description}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {selectedTopic && (
              <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border">
                <button 
                  onClick={() => setSelectedTopic(null)} 
                  className="text-indigo-600 mb-6 flex items-center gap-1 hover:text-indigo-800 transition-colors font-medium"
                >
                  <ChevronRight className="rotate-180" size={20}/> 返回主題列表
                </button>
                <div className="flex items-center gap-3 mb-6">
                  <div className="bg-gray-50 p-3 rounded-full">{selectedTopic.icon}</div>
                  <h2 className="text-2xl font-bold text-gray-900">{selectedTopic.title}</h2>
                </div>
                <ul className="space-y-4 bg-gray-50 p-6 rounded-xl border border-gray-100">
                  {selectedTopic.points.map((p, i) => (
                    <li key={i} className="flex gap-3 text-gray-700 leading-relaxed">
                      <div className="mt-1 text-indigo-500 flex-shrink-0"><SquareCheck size={20} /></div>
                      {p}
                    </li>
                  ))}
                </ul>
              </div>
            )}

            {activeTab === 'checklist' && (
              <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border">
                <div className="flex justify-between items-center mb-6 border-b pb-4">
                  <h2 className="text-2xl font-bold text-gray-900">居家安全檢核表</h2>
                  <div className="bg-indigo-100 text-indigo-800 px-4 py-2 rounded-full font-bold">
                    完成度 {score}%
                  </div>
                </div>
                <div className="space-y-3">
                  {checklistItems.map(item => (
                    <label 
                      key={item.id} 
                      className={`flex items-start gap-4 p-4 rounded-xl cursor-pointer transition-colors border ${checkedState[item.id] ? 'bg-indigo-50 border-indigo-200' : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}`}
                    >
                      <input 
                        type="checkbox" 
                        className="mt-1 w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer" 
                        checked={!!checkedState[item.id]} 
                        onChange={() => handleCheck(item.id)} 
                      />
                      <div className="flex flex-col">
                        <span className="text-xs font-bold text-indigo-600 mb-1">{item.category}</span>
                        <span className={`text-gray-800 ${checkedState[item.id] ? 'line-through opacity-70' : ''}`}>{item.text}</span>
                      </div>
                    </label>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'emergency' && (
              <div className="space-y-6">
                <div className="bg-rose-50 p-6 md:p-8 rounded-2xl border border-rose-200 shadow-sm">
                  <h2 className="text-xl font-bold text-rose-800 mb-4 flex items-center gap-2">
                    <AlertTriangle size={24} className="text-rose-600"/> 誤食緊急應變
                  </h2>
                  <div className="bg-white p-4 rounded-xl mb-3 border border-rose-100">
                    <p className="font-bold text-rose-700 flex items-center gap-2">
                      <span className="text-xl">❌</span> 絕對禁止：催吐、猛灌水、嘗試酸鹼中和。
                    </p>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-rose-100">
                    <p className="font-bold text-emerald-700 flex items-center gap-2">
                      <span className="text-xl">✅</span> 正確處理：保持鎮靜，收集誤食物品包裝，儘速就醫。
                    </p>
                  </div>
                </div>
                
                <div className="bg-orange-50 p-6 md:p-8 rounded-2xl border border-orange-200 shadow-sm">
                  <h2 className="text-xl font-bold text-orange-800 mb-4 flex items-center gap-2">
                    <HeartPulse size={24} className="text-orange-600"/> 異物梗塞急救
                  </h2>
                  <div className="bg-white p-5 rounded-xl border border-orange-100">
                    <ul className="space-y-3 text-gray-700 font-medium">
                      <li className="flex items-center gap-2">👶 嬰兒：使用拍背壓胸法。</li>
                      <li className="flex items-center gap-2">🧒 兒童及成人：使用哈姆立克急救法。</li>
                    </ul>
                  </div>
                </div>
                
                <div className="text-center pt-4">
                    <a 
                      href="tel:119" 
                      className="inline-flex items-center gap-3 bg-rose-600 hover:bg-rose-700 text-white px-8 py-4 rounded-full font-bold text-lg transition-transform hover:scale-105 shadow-lg shadow-rose-200"
                    >
                        <Phone size={24}/> 撥打 119 求援
                    </a>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
