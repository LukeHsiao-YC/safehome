<!DOCTYPE html>

    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-main: #333333;
            --text-light: #666666;
            --primary-color: #4a90e2;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            padding-bottom: 60px;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        h1 { 
            color: var(--primary-color); 
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            background-color: #f0f4f8;
            color: var(--primary-color);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            border: 1px solid #dce4ec;
            transition: all 0.2s ease;
        }

        .nav-links a.active, .nav-links a:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .cover-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .contact-info {
            font-size: 1.15rem;
            color: #444;
            background-color: #f9fbfe;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.6;
        }

        .contact-info a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #4a90e2, #1565c0);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 1.15rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
            transition: all 0.3s ease;
        }

        .btn-link:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(21, 101, 192, 0.4); 
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
        }
    </style>
</head>
