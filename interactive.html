<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全小偵探!GOGO! | 小偵探大挑戰</title>
    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-main: #333333;
            --text-light: #666666;
            --primary-color: #4a90e2;
            --card-bg: #ffffff;
            --border-color: #eaeaea;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            padding-bottom: 60px;
        }

        /* */
        header {
            text-align: center;
            padding: 40px 20px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        h1 { 
            color: var(--primary-color); 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            background-color: #f0f4f8;
            color: var(--primary-color);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            border: 1px solid #dce4ec;
            transition: all 0.2s ease;
        }

        .nav-links a.active, .nav-links a:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        /* */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .intro-text {
            font-size: 1.1rem;
            color: #444;
            margin-bottom: 30px;
        }

        /* 使用 CSS Grid 排版圖片，手機單排，平板/電腦雙排 */
        .image-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 600px) {
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .challenge-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .challenge-image:hover {
            transform: translateY(-5px);
        }

        /* */
        .download-section {
            background-color: #fff3e0;
            padding: 30px;
            border-radius: 16px;
            border: 2px dashed #ff9800;
            margin-top: 20px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(245, 124, 0, 0.3);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-download:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 124, 0, 0.4);
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>安全小偵探!GOGO!</h1>
        <div style="color: var(--text-light);">跟著小偵探，一起找出家裡的危險角落!<br>跟著小皮的腳步，一起複習一下成衛安全小偵探的秘訣吧!建議可以搭配<strong>唉唷喂呀，我的家</strong>一起玩喔!</div>
        
        <!-- -->
        <div class="nav-links">
            <a href="index.html">安全知識區</a>
            <a href="checklist.html">居家檢核表</a>
            <a href="audio.html">繪本與有聲書</a>
            <!-- 更新了導覽列名稱 -->
            <a href="interactive.html" class="active">小偵探大挑戰</a> 
        </div>
    </header>

    <div class="container">
        
        <div class="intro-text">
            爸爸媽媽，準備好和孩子一起挑戰了嗎？<br>
            看看下面的圖片，試著找出可能隱藏危險的地方吧！
        </div>

        <!-- -->
        <div class="image-grid">
            <!-- 加入了 placeholder 防止圖片未上傳時破圖，並設定了適當的寬高比 -->
            <img src="P1.png" alt="小偵探挑戰圖 1" class="challenge-image" onerror="this.onerror=null; this.src='https://placehold.co/800x600/e0e6ed/666?text=圖片+P1+準備中';">
            <img src="P2.png" alt="小偵探挑戰圖 2" class="challenge-image" onerror="this.onerror=null; this.src='https://placehold.co/800x600/e0e6ed/666?text=圖片+P2+準備中';">
            <img src="P3.png" alt="小偵探挑戰圖 3" class="challenge-image" onerror="this.onerror=null; this.src='https://placehold.co/800x600/e0e6ed/666?text=圖片+P3+準備中';">
            <img src="P4.png" alt="小偵探挑戰圖 4" class="challenge-image" onerror="this.onerror=null; this.src='https://placehold.co/800x600/e0e6ed/666?text=圖片+P4+準備中';">
        </div>

        <!-- -->
        <div class="download-section">
            <div style="font-size: 1.3rem; font-weight: bold; color: #e65100; margin-bottom: 10px;">
                🕵️‍♂️ 想親自動手畫一畫嗎？
            </div>
            <div style="color: #666; margin-bottom: 20px;">
                點擊下方按鈕下載 PDF 學習單，印出來和孩子一起當個專業的安全小偵探！
            </div>
            
            <!-- 下載連結：這裡使用 download 屬性提示瀏覽器下載檔案 -->
            <a href="安全小偵探! GOGO!! 蕭宇超.pdf" download="安全小偵探!_GOGO!!_蕭宇超.pdf" class="btn-download">
                📥 下載學習單 (PDF)
            </a>
        </div>

    </div>

    <footer>
        蕭宇超醫師整理
    </footer>
</body>
</html>
